<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparativa Educativa - Dirección de Pedagogía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .bg-educate { background-color: #004aad; }
        .text-educate { color: #004aad; }
        .truncate-school { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .font-numeric { font-family: 'Courier New', monospace; }
        .btn-compare { transition: all 0.3s ease; }
        .btn-compare:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-educate text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black">Grupo Edúcate Colombia</h1>
                <p class="text-[10px] tracking-widest opacity-80 uppercase">Dirección de Pedagogía</p>
            </div>
            <button id="btnCompararVarios" disabled onclick="abrirComparativa()" 
                    class="btn-compare bg-yellow-500 text-blue-900 px-6 py-2 rounded-full font-bold text-xs shadow-md hover:bg-yellow-400">
                Comparar Selección (<span id="countSelected">0</span>)
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        <!-- Filtros -->
        <section class="bg-white p-6 rounded-3xl shadow-sm mb-6 grid grid-cols-1 md:grid-cols-4 gap-4 border border-slate-100">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Año de Referencia</label>
                <select id="selectAnio" class="w-full p-2 border-none bg-slate-100 rounded-xl text-sm font-bold"></select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Departamento</label>
                <select id="selectDepto" class="w-full p-2 border-none bg-slate-100 rounded-xl text-sm"><option value="TODOS">Todos</option></select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Municipio</label>
                <select id="selectMpio" class="w-full p-2 border-none bg-slate-100 rounded-xl text-sm"><option value="TODOS">Todos</option></select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Buscador</label>
                <input type="text" id="inputBusqueda" placeholder="Nombre o DANE..." class="w-full p-2 border-none bg-slate-100 rounded-xl text-sm">
            </div>
        </section>

        <!-- Tabla -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] uppercase text-slate-400 font-bold border-b">
                        <tr>
                            <th class="p-5 text-center w-12">Sel.</th>
                            <th class="p-5">Institución Educativa</th>
                            <th class="p-5 text-center">Cat.</th>
                            <th class="p-5 text-center bg-blue-50 text-blue-600">Total</th>
                            <th class="p-5 text-center">Mat</th>
                            <th class="p-5 text-center">Lect</th>
                            <th class="p-5 text-center">Soc</th>
                            <th class="p-5 text-center">Cien</th>
                            <th class="p-5 text-center">Ing</th>
                            <th class="p-5 text-center">Hist.</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="text-sm divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Gráfica -->
    <div id="modalGrafica" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-blue-900/40 backdrop-blur-md p-4">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-8 bg-slate-50 border-b flex justify-between items-center">
                <h2 class="text-xl font-black text-educate uppercase tracking-tight">Comparativa de Desempeño Histórico</h2>
                <button onclick="cerrarModal()" class="text-slate-300 hover:text-red-500 text-3xl font-light">&times;</button>
            </div>
            <div class="p-10">
                <canvas id="chartHistorico" height="120"></canvas>
                <div class="mt-8 flex justify-between items-center">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Generado por Dirección de Pedagogía</p>
                    <div class="flex gap-4">
                        <button onclick="descargarGrafica()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl text-xs font-bold shadow-lg hover:bg-blue-700">📥 Exportar PNG</button>
                        <button onclick="cerrarModal()" class="bg-slate-100 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold hover:bg-slate-200">Cerrar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const aniosH = Array.from({length: 12}, (_, i) => 2014 + i);
        let dataFull = [];
        let seleccionados = [];
        let myChart = null;

        const selAnio = document.getElementById('selectAnio');
        aniosH.slice().reverse().forEach(a => selAnio.innerHTML += `<option value="${a}">${a}</option>`);

        async function cargar() {
            const a = selAnio.value;
            try {
                const r = await fetch(`./data/data_${a}.json`);
                dataFull = await r.json();
                llenarSelects();
                filtrar();
            } catch (e) { alert("Error cargando datos del año " + a); }
        }

        function llenarSelects() {
            const depts = [...new Set(dataFull.map(d => d.departamento))].sort();
            const sD = document.getElementById('selectDepto');
            sD.innerHTML = '<option value="TODOS">Todos</option>';
            depts.forEach(d => sD.innerHTML += `<option value="${d}">${d}</option>`);
        }

        function filtrar() {
            const d = document.getElementById('selectDepto').value;
            const m = document.getElementById('selectMpio').value;
            const b = document.getElementById('inputBusqueda').value.toLowerCase();
            const filtered = dataFull.filter(x => (d==='TODOS'||x.departamento===d) && (m==='TODOS'||x.municipio===m) && (x.nombre.toLowerCase().includes(b)||x.cod_dane.includes(b)));
            dibujar(filtered);
        }

        function dibujar(data) {
            const tbody = document.getElementById('cuerpoTabla');
            tbody.innerHTML = '';
            data.slice(0, 100).forEach(x => {
                const isChecked = seleccionados.find(s => s.cod_dane === x.cod_dane);
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="p-5 text-center"><input type="checkbox" ${isChecked?'checked':''} onchange="toggleSel('${x.cod_dane}', this)" class="w-4 h-4 rounded border-slate-300"></td>
                        <td class="p-5"><div class="text-base font-black text-educate truncate-school uppercase">${x.nombre}</div><div class="text-[9px] text-slate-400 font-bold tracking-tighter">DANE: ${x.cod_dane} | #${x.ranking_nacional} Nal.</div></td>
                        <td class="p-5 text-center font-bold text-slate-400">${x.clasificacion}</td>
                        <td class="p-5 text-center font-numeric font-black bg-blue-50/50 text-blue-700">${parseFloat(x.indice_total).toFixed(4)}</td>
                        <td class="p-5 text-center font-numeric text-slate-500">${x.evaluados_3anios}</td>
                        <td class="p-5 text-center font-numeric text-slate-400">${parseFloat(x["indice de Lectura Crítica"]||0).toFixed(4)}</td>
                        <td class="p-5 text-center font-numeric text-slate-400">${parseFloat(x["indice de Sociales y Ciudadanas"]||0).toFixed(4)}</td>
                        <td class="p-5 text-center font-numeric text-slate-400">${parseFloat(x["indice de Ciencias Naturales"]||0).toFixed(4)}</td>
                        <td class="p-5 text-center font-numeric text-slate-400">${parseFloat(x["indice de Inglés"]||0).toFixed(4)}</td>
                        <td class="p-5 text-center"><button onclick="verHistorial('${x.cod_dane}', '${x.nombre}')" class="text-lg">📈</button></td>
                    </tr>
                `;
            });
        }

        function toggleSel(dane, el) {
            if(el.checked) {
                if(seleccionados.length >= 3) {
                    alert("Límite alcanzado: Solo puedes comparar hasta 3 colegios a la vez.");
                    el.checked = false;
                    return;
                }
                seleccionados.push(dataFull.find(x => x.cod_dane === dane));
            } else {
                seleccionados = seleccionados.filter(s => s.cod_dane !== dane);
            }
            document.getElementById('countSelected').innerText = seleccionados.length;
            document.getElementById('btnCompararVarios').disabled = seleccionados.length < 2;
        }

        async function abrirComparativa() {
            document.getElementById('modalGrafica').classList.remove('hidden');
            const datasets = [];
            const colores = ['#004aad', '#eab308', '#22c55e'];
            
            for(let i=0; i<seleccionados.length; i++) {
                const col = seleccionados[i];
                const vals = [];
                for(let a of aniosH) {
                    try {
                        const r = await fetch(`./data/data_${a}.json`);
                        const d = await r.json();
                        const found = d.find(x => x.cod_dane === col.cod_dane);
                        vals.push(found ? parseFloat(found.indice_total) : null);
                    } catch { vals.push(null); }
                }
                datasets.push({ label: col.nombre, data: vals, borderColor: colores[i], tension: 0.3, borderWidth: 4, pointRadius: 5 });
            }
            renderChart(datasets);
        }

        async function verHistorial(dane, nombre) {
            seleccionados = [dataFull.find(x => x.cod_dane === dane)];
            abrirComparativa();
        }

        function renderChart(ds) {
            const ctx = document.getElementById('chartHistorico').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: aniosH, datasets: ds },
                options: { 
                    responsive: true, 
                    plugins: { legend: { position: 'bottom', labels: { font: { weight: 'bold', size: 10 } } } },
                    scales: { y: { ticks: { font: { family: 'monospace' } } } }
                }
            });
        }

        function cerrarModal() { document.getElementById('modalGrafica').classList.add('hidden'); }
        function descargarGrafica() {
            const link = document.createElement('a');
            link.download = 'Comparativa_Educate.png';
            link.href = document.getElementById('chartHistorico').toDataURL('image/png');
            link.click();
        }

        selAnio.addEventListener('change', cargar);
        document.getElementById('selectDepto').addEventListener('change', () => {
            const d = document.getElementById('selectDepto').value;
            const mpios = [...new Set(dataFull.filter(x => d==='TODOS'||x.departamento===d).map(x => x.municipio))].sort();
            const sM = document.getElementById('selectMpio');
            sM.innerHTML = '<option value="TODOS">Todos</option>';
            mpios.forEach(m => sM.innerHTML += `<option value="${m}">${m}</option>`);
            filtrar();
        });
        document.getElementById('selectMpio').addEventListener('change', filtrar);
        document.getElementById('inputBusqueda').addEventListener('input', filtrar);
        window.onload = cargar;
    </script>
</body>
</html>
