<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Saber 11 - Grupo Edúcate Colombia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-educate { background-color: #004aad; }
        .text-educate { color: #004aad; }
        .hover-row:hover { background-color: #f8fafc; cursor: pointer; }
        .font-numeric { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-educate text-white p-6 shadow-md">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold italic tracking-tight">Grupo Edúcate Colombia</h1>
                <p class="text-xs opacity-75 uppercase tracking-widest">Análisis Pedagógico Saber 11</p>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <p class="text-sm font-medium">Director: Marlon Galviz</p>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        <!-- Filtros Superiores -->
        <section class="bg-white p-4 rounded-xl shadow-sm mb-6 grid grid-cols-1 md:grid-cols-4 gap-4 border border-gray-100">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Año de Prueba</label>
                <select id="selectAnio" class="w-full p-2 border rounded-lg bg-gray-50 text-sm">
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Departamento</label>
                <select id="selectDepto" class="w-full p-2 border rounded-lg bg-gray-50 text-sm">
                    <option value="TODOS">Todos</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Municipio</label>
                <select id="selectMpio" class="w-full p-2 border rounded-lg bg-gray-50 text-sm">
                    <option value="TODOS">Todos</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Categoría ICFES</label>
                <select id="selectClasif" class="w-full p-2 border rounded-lg bg-gray-50 text-sm">
                    <option value="TODOS">Todas</option>
                    <option value="A+">A+</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>
        </section>

        <!-- Buscador -->
        <div class="mb-6">
            <input type="text" id="inputBusqueda" placeholder="🔍 Escribe el nombre del colegio o código DANE..." 
                   class="w-full p-4 border rounded-xl shadow-inner focus:ring-2 focus:ring-blue-500 outline-none text-lg">
        </div>

        <div id="loading" class="text-center py-10 hidden">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-600"></div>
            <p class="mt-2 text-gray-500">Procesando datos del ICFES...</p>
        </div>

        <section id="vistaResultados" class="hidden">
            <!-- Ficha de Detalle -->
            <div id="fichaColegio" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 hidden">
                <div class="bg-blue-700 text-white p-5 rounded-xl shadow-md">
                    <span class="text-[10px] uppercase font-bold opacity-70">Ranking Nacional</span>
                    <p class="text-3xl font-black" id="rankNac">-</p>
                </div>
                <div class="bg-indigo-600 text-white p-5 rounded-xl shadow-md">
                    <span class="text-[10px] uppercase font-bold opacity-70" id="labelDepto">Ranking Depto</span>
                    <p class="text-3xl font-black" id="rankDep">-</p>
                </div>
                <div class="bg-teal-600 text-white p-5 rounded-xl shadow-md">
                    <span class="text-[10px] uppercase font-bold opacity-70" id="labelMpio">Ranking Mpio</span>
                    <p class="text-3xl font-black" id="rankMpio">-</p>
                </div>
            </div>

            <!-- Tabla de Datos Completa -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 text-[10px] uppercase text-gray-500 font-bold border-b">
                            <tr>
                                <th class="p-4">Institución</th>
                                <th class="p-4 text-center">Cat.</th>
                                <th class="p-4 text-center bg-blue-50 text-blue-700">Total</th>
                                <th class="p-4 text-center">Mat</th>
                                <th class="p-4 text-center">Lect</th>
                                <th class="p-4 text-center">Soc</th>
                                <th class="p-4 text-center">Cien</th>
                                <th class="p-4 text-center">Ing</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="text-sm divide-y divide-gray-100">
                            <!-- Filas dinámicas -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        let dataGlobal = [];
        let dataFiltrada = [];

        async function cargarDatos() {
            const anio = document.getElementById('selectAnio').value;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('vistaResultados').classList.add('hidden');
            
            try {
                const respuesta = await fetch(`./data/data_${anio}.json`);
                dataGlobal = await respuesta.json();
                llenarSelectsTerritorio();
                aplicarFiltros();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('vistaResultados').classList.remove('hidden');
            } catch (error) {
                console.error("Error:", error);
                alert("Verifica que el archivo ./data/data_" + anio + ".json exista.");
            }
        }

        function llenarSelectsTerritorio() {
            const deptos = [...new Set(dataGlobal.map(d => d.departamento))].sort();
            const selectDepto = document.getElementById('selectDepto');
            selectDepto.innerHTML = '<option value="TODOS">Todos</option>';
            deptos.forEach(d => selectDepto.innerHTML += `<option value="${d}">${d}</option>`);
        }

        function actualizarMunicipios() {
            const deptoSel = document.getElementById('selectDepto').value;
            const mpios = [...new Set(dataGlobal.filter(d => deptoSel === 'TODOS' || d.departamento === deptoSel).map(d => d.municipio))].sort();
            const selectMpio = document.getElementById('selectMpio');
            selectMpio.innerHTML = '<option value="TODOS">Todos</option>';
            mpios.forEach(m => selectMpio.innerHTML += `<option value="${m}">${m}</option>`);
            aplicarFiltros();
        }

        function aplicarFiltros() {
            const depto = document.getElementById('selectDepto').value;
            const mpio = document.getElementById('selectMpio').value;
            const clasif = document.getElementById('selectClasif').value;
            const busq = document.getElementById('inputBusqueda').value.toLowerCase();

            dataFiltrada = dataGlobal.filter(d => {
                const mD = depto === 'TODOS' || d.departamento === depto;
                const mM = mpio === 'TODOS' || d.municipio === mpio;
                const mC = clasif === 'TODOS' || d.clasificacion === clasif;
                const mB = d.nombre.toLowerCase().includes(busq) || d.cod_dane.includes(busq);
                return mD && mM && mC && mB;
            });
            dibujarTabla();
        }

        function dibujarTabla(resaltado = null) {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = '';
            
            // Limitamos a 50 para rapidez visual
            dataFiltrada.slice(0, 50).forEach(d => {
                const esR = resaltado && d.cod_dane === resaltado.cod_dane;
                
                // Mapeo de claves exactas de tu JSON
                const total = parseFloat(d.indice_total || 0).toFixed(4);
                const mat = parseFloat(d["indice de Matemática"] || 0).toFixed(4);
                const lec = parseFloat(d["indice de Lectura Crítica"] || 0).toFixed(4);
                const soc = parseFloat(d["indice de Sociales y Ciudadanas"] || 0).toFixed(4);
                const cie = parseFloat(d["indice de Ciencias Naturales"] || 0).toFixed(4);
                const ing = parseFloat(d["indice de Inglés"] || 0).toFixed(4);

                cuerpo.innerHTML += `
                    <tr class="hover-row ${esR ? 'bg-yellow-50 border-l-4 border-yellow-500 font-bold' : ''}" 
                        onclick="verDetalle('${d.cod_dane}')">
                        <td class="p-4">
                            <div class="text-blue-800 font-bold uppercase text-[11px]">${d.nombre}</div>
                            <div class="text-[10px] text-gray-400">${d.municipio} | Puesto #${d.ranking_nacional}</div>
                        </td>
                        <td class="p-4 text-center font-bold text-gray-500">${d.clasificacion}</td>
                        <td class="p-4 text-center font-numeric font-bold bg-blue-50 text-blue-700">${total}</td>
                        <td class="p-4 text-center font-numeric text-gray-600">${mat}</td>
                        <td class="p-4 text-center font-numeric text-gray-600">${lec}</td>
                        <td class="p-4 text-center font-numeric text-gray-600">${soc}</td>
                        <td class="p-4 text-center font-numeric text-gray-600">${cie}</td>
                        <td class="p-4 text-center font-numeric text-gray-600">${ing}</td>
                    </tr>
                `;
            });
        }

        function verDetalle(dane) {
            const col = dataGlobal.find(d => d.cod_dane === dane);
            if(!col) return;

            const ficha = document.getElementById('fichaColegio');
            ficha.classList.remove('hidden');
            document.getElementById('rankNac').innerText = `#${col.ranking_nacional}`;
            document.getElementById('rankDep').innerText = `#${col.ranking_departamento}`;
            document.getElementById('rankMpio').innerText = `#${col.ranking_municipio}`;
            document.getElementById('labelDepto').innerText = `Puesto en ${col.departamento}`;
            document.getElementById('labelMpio').innerText = `Puesto en ${col.municipio}`;

            if(confirm(`¿Comparar ${col.nombre} con los mejores de ${col.municipio}?`)) {
                document.getElementById('selectDepto').value = col.departamento;
                actualizarMunicipios();
                document.getElementById('selectMpio').value = col.municipio;
                document.getElementById('selectClasif').value = 'TODOS';
                document.getElementById('inputBusqueda').value = '';
                aplicarFiltros();
                dibujarTabla(col);
                window.scrollTo({ top: 300, behavior: 'smooth' });
            }
        }

        // Eventos
        document.getElementById('selectAnio').addEventListener('change', cargarDatos);
        document.getElementById('selectDepto').addEventListener('change', actualizarMunicipios);
        document.getElementById('selectMpio').addEventListener('change', aplicarFiltros);
        document.getElementById('selectClasif').addEventListener('change', aplicarFiltros);
        document.getElementById('inputBusqueda').addEventListener('input', aplicarFiltros);

        window.onload = cargarDatos;
    </script>
</body>
</html>
